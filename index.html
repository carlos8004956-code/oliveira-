<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila de Estudos</title>

<style>
:root{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#222;
    --primary:#2563eb;
}

.dark{
    --bg:#121212;
    --card:#1e1e1e;
    --text:#f5f5f5;
    --primary:#3b82f6;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

header{
    background:var(--primary);
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:var(--card);
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

ul{
    padding-left:20px;
}

.task-done{
    text-decoration:line-through;
    opacity:0.6;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
<h1>🎒 Mochila de Estudos</h1>
<button onclick="toggleTheme()">🌙 Alternar Tema</button>
</header>

<div class="container">

<div class="card">
<h2>👤 Perfil do Aluno</h2>

<input id="nomeAluno" placeholder="Nome do aluno">
<input id="turmaAluno" placeholder="Turma">
<button onclick="salvarPerfil()">Salvar Perfil</button>

<p><strong>Aluno:</strong> <span id="perfilNome">-</span></p>
<p><strong>Turma:</strong> <span id="perfilTurma">-</span></p>
</div>

<div class="grid">

<div class="card">
<h2>📚 Matérias</h2>

<input id="materiaInput" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar</button>

<ul id="materias"></ul>
</div>

<div class="card">
<h2>📝 Tarefas</h2>

<input id="tarefaInput" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar</button>

<ul id="tarefas"></ul>
</div>

</div>

<div class="grid">

<div class="card">
<h2>📊 Notas</h2>

<input id="notaMateria" placeholder="Matéria">
<input id="notaValor" type="number" step="0.1" placeholder="Nota">
<button onclick="addNota()">Adicionar</button>

<ul id="notas"></ul>

<h3>Média: <span id="media">0</span></h3>
</div>

<div class="card">
<h2>📅 Provas</h2>

<input id="provaMateria" placeholder="Matéria">
<input id="provaData" type="date">
<button onclick="addProva()">Adicionar</button>

<ul id="provas"></ul>
</div>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("mochila")) || {
perfil:{nome:"",turma:""},
materias:[],
tarefas:[],
notas:[],
provas:[],
dark:false
};

function save(){
localStorage.setItem("mochila",JSON.stringify(data));
render();
}

function render(){

document.body.classList.toggle("dark",data.dark);

document.getElementById("perfilNome").textContent =
data.perfil.nome || "-";

document.getElementById("perfilTurma").textContent =
data.perfil.turma || "-";

const materias=document.getElementById("materias");
materias.innerHTML="";

data.materias.forEach((m,i)=>{
const li=document.createElement("li");
li.innerHTML=`
${m}
<button onclick="deleteMateria(${i})">❌</button>
`;
materias.appendChild(li);
});

const tarefas=document.getElementById("tarefas");
tarefas.innerHTML="";

data.tarefas.forEach((t,i)=>{
const li=document.createElement("li");
li.className=t.done ? "task-done":"";
li.innerHTML=`
<span onclick="toggleTask(${i})" style="cursor:pointer">
${t.text}
</span>
<button onclick="deleteTask(${i})">❌</button>
`;
tarefas.appendChild(li);
});

const notas=document.getElementById("notas");
notas.innerHTML="";

let soma=0;

data.notas.forEach((n,i)=>{
soma+=Number(n.valor);

const li=document.createElement("li");

li.innerHTML=`
${n.materia}: ${n.valor}
<button onclick="deleteNota(${i})">❌</button>
`;

notas.appendChild(li);
});

document.getElementById("media").textContent=
data.notas.length
? (soma/data.notas.length).toFixed(2)
: "0";

const provas=document.getElementById("provas");
provas.innerHTML="";

data.provas.forEach((p,i)=>{
const li=document.createElement("li");

li.innerHTML=`
${p.materia} - ${p.data}
<button onclick="deleteProva(${i})">❌</button>
`;

provas.appendChild(li);
});
}

function salvarPerfil(){
data.perfil.nome=
document.getElementById("nomeAluno").value;

data.perfil.turma=
document.getElementById("turmaAluno").value;

save();
}

function addMateria(){

const v=document.getElementById("materiaInput").value.trim();

if(!v)return;

data.materias.push(v);

document.getElementById("materiaInput").value="";

save();
}

function deleteMateria(i){
data.materias.splice(i,1);
save();
}

function addTarefa(){

const v=document.getElementById("tarefaInput").value.trim();

if(!v)return;

data.tarefas.push({
text:v,
done:false
});

document.getElementById("tarefaInput").value="";

save();
}

function toggleTask(i){
data.tarefas[i].done=!data.tarefas[i].done;
save();
}

function deleteTask(i){
data.tarefas.splice(i,1);
save();
}

function addNota(){

const materia=
document.getElementById("notaMateria").value.trim();

const valor=
document.getElementById("notaValor").value;

if(!materia || !valor)return;

data.notas.push({
materia,
valor
});

document.getElementById("notaMateria").value="";
document.getElementById("notaValor").value="";

save();
}

function deleteNota(i){
data.notas.splice(i,1);
save();
}

function addProva(){

const materia=
document.getElementById("provaMateria").value.trim();

const dataProva=
document.getElementById("provaData").value;

if(!materia || !dataProva)return;

data.provas.push({
materia,
data:dataProva
});

document.getElementById("provaMateria").value="";
document.getElementById("provaData").value="";

save();
}

function deleteProva(i){
data.provas.splice(i,1);
save();
}

function toggleTheme(){
data.dark=!data.dark;
save();
}

render();

</script>
</body>
</html>
